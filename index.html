<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%icons/pwa-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f3f7f2" />
    <title>Workout Tracker</title>

    <!-- Apply the saved theme before paint to avoid a flash of the default. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('theme') || 'forest-light'
          // Themes removed in later versions fall back to the default (flash-free).
          var removed = [
            'emerald-dark',
            'emerald-light',
            'amethyst-dark',
            'amethyst-light',
            'coral-dark',
            'coral-light',
          ]
          if (removed.indexOf(t) !== -1) t = 'forest-light'
          var el = document.documentElement
          el.setAttribute('data-theme', t)
          // Keep in sync with DARK_THEME_IDS in src/lib/theme.ts
          var darkThemes = [
            'dark',
            'solarized-dark',
            'forest-dark',
            'darcula',
            'nord',
            'sunset-dark',
            'slate-dark',
            'gruvbox-dark',
            'bubblegum-dark',
            'synthwave-dark',
            'crimson-dark',
          ]
          el.classList.toggle('dark', darkThemes.indexOf(t) !== -1)
        } catch (e) {}
      })()
    </script>

    <!-- Apple PWA meta -->
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Workouts" />

    <!-- GitHub Pages SPA redirect: restore the URL saved by 404.html -->
    <script>
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
